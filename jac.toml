[project]
name = "depgraph"
version = "0.1.0"
description = "Autonomous dependency vulnerability investigation agent (JacHacks 2026)"
entry-point = "main.jac"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.byllm.model]
default_model = "featherless_ai/deepseek-ai/DeepSeek-V3-0324"
api_base = "https://api.featherless.ai/v1"

[plugins.byllm.call_params]
temperature = 0.2
